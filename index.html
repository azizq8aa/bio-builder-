<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - صانع الملفات التعريفية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h2 id="form-title">تسجيل الدخول</h2>
            <p id="form-subtitle">مرحبًا بعودتك! أدخل بياناتك للمتابعة.</p>
            
            <form id="auth-form">
                <div class="input-group" id="username-group" style="display: none;">
                    <label for="username">اسم المستخدم (للرابط)</label>
                    <input type="text" id="username" placeholder="مثال: aziz (سيصبح الرابط .../aziz)">
                    <small>استخدم حروف إنجليزية وأرقام فقط، بدون مسافات.</small>
                </div>
                <div class="input-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" required>
                </div>
                <div class="input-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" required>
                </div>
                
                <button type="submit" id="submit-btn">تسجيل الدخول</button>
            </form>
            
            <p id="error-message" class="error-message"></p>
            
            <div class="toggle-form">
                <p id="toggle-text">ليس لديك حساب؟</p>
                <button id="toggle-btn">أنشئ حسابًا جديدًا</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="auth.js"></script>
</body>
</html>
